name: frontier-review

services:
  agent:
    build: ./services/agent
    environment:
      PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5175,http://127.0.0.1:5175}
      FRONTIER_REVIEW_REQUIRE_SECURE_CONFIG: ${FRONTIER_REVIEW_REQUIRE_SECURE_CONFIG:-true}
      FRONTIER_REVIEW_ALLOW_INSECURE_DEFAULTS: ${FRONTIER_REVIEW_ALLOW_INSECURE_DEFAULTS:-false}
      FRONTIER_REVIEW_ENABLE_DOCS: ${FRONTIER_REVIEW_ENABLE_DOCS:-false}
      FRONTIER_REVIEW_ENABLE_SCHEDULER: ${FRONTIER_REVIEW_ENABLE_SCHEDULER:-true}
      FRONTIER_REVIEW_DATA_DIR: ${FRONTIER_REVIEW_DATA_DIR:-/data/frontier_review}
      BIBLIOCN_CORPORA_DIR: ${BIBLIOCN_CORPORA_DIR:-/data/corpora}
      SCIVERSE_API_TOKEN: ${SCIVERSE_API_TOKEN:-}
      SCIVERSE_BASE_URL: ${SCIVERSE_BASE_URL:-https://api.sciverse.space}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DAILY_REVIEW_ADMIN_SECRET: ${DAILY_REVIEW_ADMIN_SECRET:-change-me-in-production}
      DAILY_REVIEW_ADMIN_USERNAME: ${DAILY_REVIEW_ADMIN_USERNAME:-admin}
      DAILY_REVIEW_ADMIN_PASSWORD: ${DAILY_REVIEW_ADMIN_PASSWORD:-please-change-admin-password}
      ADMIN_LOGIN_RATE_LIMIT_PER_MINUTE: ${ADMIN_LOGIN_RATE_LIMIT_PER_MINUTE:-10}
      TRANSLATION_RATE_LIMIT_PER_MINUTE: ${TRANSLATION_RATE_LIMIT_PER_MINUTE:-30}
      MAX_CACHED_IMAGE_BYTES: ${MAX_CACHED_IMAGE_BYTES:-10485760}
      DAILY_REVIEW_LITERATURE_PROVIDER: ${DAILY_REVIEW_LITERATURE_PROVIDER:-hybrid}
      PAPER_SEARCH_SOURCES: ${PAPER_SEARCH_SOURCES:-semantic,openalex,crossref,europepmc,hal,base,core,unpaywall}
      PAPER_SEARCH_VALIDATE_LINKS: ${PAPER_SEARCH_VALIDATE_LINKS:-true}
      PAPER_SEARCH_MCP_CORE_API_KEY: ${PAPER_SEARCH_MCP_CORE_API_KEY:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY: ${PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      SEMANTIC_SCHOLAR_MIN_INTERVAL_SECONDS: ${SEMANTIC_SCHOLAR_MIN_INTERVAL_SECONDS:-1.15}
      PAPER_SEARCH_MCP_UNPAYWALL_EMAIL: ${PAPER_SEARCH_MCP_UNPAYWALL_EMAIL:-}
      UNPAYWALL_EMAIL: ${UNPAYWALL_EMAIL:-}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-}
      PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN: ${PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN:-}
      PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL: ${PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL:-}
      PAPER_SEARCH_MCP_ACM_API_KEY: ${PAPER_SEARCH_MCP_ACM_API_KEY:-}
      PAPER_SEARCH_MCP_IEEE_API_KEY: ${PAPER_SEARCH_MCP_IEEE_API_KEY:-}
    volumes:
      - ./data/frontier_review:/data/frontier_review
      - ./data/corpora:/data/corpora
    ports:
      - "127.0.0.1:8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE: /api
    depends_on:
      agent:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
